name: ClipDock
options:
  bundleIdPrefix: com.epiral
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

packages:
  grpc-swift-2:
    url: https://github.com/grpc/grpc-swift-2.git
    from: "2.0.0"
  grpc-swift-nio-transport:
    url: https://github.com/grpc/grpc-swift-nio-transport.git
    from: "2.0.0"
  grpc-swift-protobuf:
    url: https://github.com/grpc/grpc-swift-protobuf.git
    from: "2.0.0"
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.28.0"

targets:
  ClipDock:
    type: application
    platform: iOS
    sources:
      - ClipDock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.epiral.clip-dock
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "21"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7MTHK6DGS4
        SWIFT_VERSION: "5.0"
        # iOS 专属能力权限声明（对应 IOSSystemBridgeHandler / IOSLocationBridgeHandler / IOSMediaBridgeHandler）
        INFOPLIST_KEY_NSCameraUsageDescription: "Clip 需要访问相机以拍摄图片"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Clip 需要访问麦克风以录制音频"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Clip 需要访问位置以获取当前坐标"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Clip 需要访问相册以选择图片"
    dependencies:
      - package: grpc-swift-2
        product: GRPCCore
      - package: grpc-swift-nio-transport
        product: GRPCNIOTransportHTTP2
      - package: grpc-swift-protobuf
        product: GRPCProtobuf
      - package: SwiftProtobuf
        product: SwiftProtobuf
