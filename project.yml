name: PinixShell
options:
  bundleIdPrefix: com.epiral
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Connect:
    url: https://github.com/connectrpc/connect-swift
    from: "1.0.0"
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.28.0"

targets:
  PinixShell:
    type: application
    platform: iOS
    sources:
      - PinixShell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.epiral.pinix-shell
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7MTHK6DGS4
        SWIFT_VERSION: "5.0"
        # iOS 专属能力权限声明（对应 IOSSystemBridgeHandler / IOSLocationBridgeHandler / IOSMediaBridgeHandler）
        INFOPLIST_KEY_NSCameraUsageDescription: "Clip 需要访问相机以拍摄图片"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Clip 需要访问麦克风以录制音频"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Clip 需要访问位置以获取当前坐标"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Clip 需要访问相册以选择图片"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Clip 需要读取健康数据以展示健康指标"
    entitlements:
      path: PinixShell/PinixShell.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: Connect
        product: Connect
      - package: SwiftProtobuf
        product: SwiftProtobuf
